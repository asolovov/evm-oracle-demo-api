services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]

  app:
    build: .
    restart: unless-stopped
    depends_on:
      - redis
    ports:
      - "8080:8080"   # REST + WebSocket
    environment:
      HTTP_HOST: "0.0.0.0"
      HTTP_PORT: 8080
      REDIS_ADDR: redis:6379
      # PriceServiceAddr / IndexerServiceAddr default to localhost — override
      # in a real environment so the BFF can reach the upstream services.
