# Service-owned codegen config (architecture rule 9).
#
# Codegen targets the protocols/ subtree and writes its output to
# internal/genproto/. The output directory is gitignored — `make build`
# (and the multi-stage Dockerfile) re-run codegen on every build so a
# fresh clone produces a working binary without any committed *.pb.go.
#
# `managed` mode retargets the `go_package` baked into the upstream IDL
# (which points at github.com/asolovov/evm-oracle-demo-protocols/...) so
# the generated Go sources live under this service's module path. The
# protocols repo stays language-agnostic; each consumer service owns its
# own retarget.
#
# Local plugins (not buf.build remote): codegen must work offline and
# without a buf.build account — the remote plugins 403 in CI / sandboxed
# builds. `make proto-install` and the Dockerfile both `go install` the
# pinned protoc-gen-go / protoc-gen-go-grpc onto PATH, so `local:` resolves
# to those exact versions everywhere.

version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/asolovov/evm-oracle-demo-api/internal/genproto
plugins:
  - local: protoc-gen-go
    out: internal/genproto
    opt: paths=source_relative
  - local: protoc-gen-go-grpc
    out: internal/genproto
    opt: paths=source_relative
inputs:
  - directory: protocols
