name: Release

on:
  push:
    branches: ["main"]

permissions:
  contents: write
  actions: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# Every third-party action is SHA-pinned per Gateway's NFR-07
# (no floating @v4 / @v5 tags).

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      next_tag: ${{ steps.next_tag.outputs.next_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set up Go
        uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed # v5.1.0
        with:
          go-version: "1.24"

      - name: Cache Go modules
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install dependencies
        run: go mod download

      - name: Install proto codegen toolchain
        run: make proto-install

      - name: Install golangci-lint
        run: make lint-install

      - name: Run CI checks (lint)
        run: make lint

      - name: Run CI checks (test)
        run: make test

      - name: Run CI checks (build)
        run: make build

      - name: Determine next tag (semantic)
        id: next_tag
        shell: bash
        run: |
          git fetch --tags

          last_tag=$(git tag --list 'v[0-9]*' | sort -V | tail -n 1)

          if [ -z "$last_tag" ]; then
            echo "next_tag=v1.0.0" | tee -a "$GITHUB_OUTPUT"
            exit 0
          fi

          commits=$(git log "${last_tag}..HEAD" --format='%s' || true)

          bump="patch"
          if echo "$commits" | grep -Eqi 'BREAKING CHANGE'; then
            bump="major"
          elif echo "$commits" | grep -Eqi '^feat(\(|:|!|$)|^feature(\(|:|!|$)'; then
            bump="minor"
          fi
          if echo "$commits" | grep -Eq '^[a-zA-Z]+!:'; then
            bump="major"
          fi

          version=${last_tag#v}
          IFS='.' read -r major minor patch <<< "$version"
          : "${major:=1}"
          : "${minor:=0}"
          : "${patch:=0}"

          case "$bump" in
            major)
              major=$((major + 1)); minor=0; patch=0
              ;;
            minor)
              minor=$((minor + 1)); patch=0
              ;;
            *)
              patch=$((patch + 1))
              ;;
          esac

          next_tag="v${major}.${minor}.${patch}"
          echo "next_tag=$next_tag" | tee -a "$GITHUB_OUTPUT"

      - name: Create tag
        env:
          TAG: ${{ steps.next_tag.outputs.next_tag }}
        run: |
          git tag "$TAG"
          git push origin "$TAG"

  release:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Create GitHub release
        uses: softprops/action-gh-release@c062e08bd532815e2082a85e87e3ef29c3e6d191 # v2.0.8
        with:
          tag_name: ${{ needs.prepare.outputs.next_tag }}
          generate_release_notes: true
          name: Release ${{ needs.prepare.outputs.next_tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
